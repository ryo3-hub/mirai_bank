name: mirai_bank
description: "自己投資価値見える化アプリ"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local DB
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Routing
  go_router: ^14.2.7

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Charts & Calendar
  fl_chart: ^0.68.0
  table_calendar: ^3.1.2

  # Celebration
  confetti: ^0.7.0

  # Local key-value storage (onboarding flag etc.)
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.4.13
  drift_dev: ^2.20.3
  riverpod_generator: ^2.4.3
  riverpod_lint: ^2.3.13
  custom_lint: ^0.6.7

  # Splash screen generation
  flutter_native_splash: ^2.4.1

  # App launcher icon generation
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

# Splash screen configuration.
# After editing this section (or after regenerating the logo via
# `python3 tool/generate_logo.py`) run:
#   dart run flutter_native_splash:create
flutter_native_splash:
  # Light mode: pure white background to match the in-app light theme.
  color: "#FFFFFF"
  # Dark mode: deep indigo (close to ColorScheme.fromSeed dark surface).
  color_dark: "#1E1B4B"

  # Logo (transparent PNG). Light variant uses Indigo on transparent;
  # dark variant uses white on transparent.
  image: assets/splash/logo.png
  image_dark: assets/splash/logo_dark.png

  # Android 12+ uses a separate splash; mirror the colors above and
  # use the same logos as the icon.
  android_12:
    color: "#FFFFFF"
    color_dark: "#1E1B4B"
    image: assets/splash/logo.png
    image_dark: assets/splash/logo_dark.png

  # Platforms to generate native assets for.
  android: true
  ios: true
  web: false

# App launcher icon configuration.
# After editing this section (or regenerating icons via
# `python3 tool/generate_logo.py`) run:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  # iOS: must be opaque PNG (no alpha) — icon.png is generated with solid BG.
  ios: true
  remove_alpha_ios: true
  # Android: legacy + adaptive icons.
  android: "launcher_icon"
  adaptive_icon_background: "#4F46E5"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  min_sdk_android: 21

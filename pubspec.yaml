name: mirai_bank
description: "自己投資価値見える化アプリ"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local DB
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Routing
  go_router: ^14.2.7

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Charts & Calendar
  fl_chart: ^0.68.0
  table_calendar: ^3.1.2

  # Celebration
  confetti: ^0.7.0

  # Local key-value storage (onboarding flag etc.)
  shared_preferences: ^2.3.2
  in_app_review: ^2.0.12
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.1
  # 12.4.0 は isiOSAppOnVision セレクタを使っており、現在の Xcode SDK では
  # ビルドが通らない（visionOS 検知。「No visible @interface for
  # 'NSProcessInfo' declares the selector 'isiOSAppOnVision'」）。
  # Xcode 更新待ちのため 11.x 系に固定（issue #142 / #145 の追従修正）。
  device_info_plus: ^11.3.0
  share_plus: ^12.0.2
  file_picker: ^11.0.2
  sentry_flutter: ^9.20.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.4.13
  drift_dev: ^2.20.3
  riverpod_generator: ^2.4.3
  riverpod_lint: ^2.3.13
  custom_lint: ^0.6.7

  # Splash screen generation
  flutter_native_splash: ^2.4.1

  # App launcher icon generation
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

# Splash screen configuration.
# After editing this section (or after regenerating the logo via
# `python3 tool/generate_logo.py`) run:
#   dart run flutter_native_splash:create
flutter_native_splash:
  # Portrait brand artwork covers the entire screen via `background_image`
  # (iOS's `LaunchBackground` view uses `scaleToFill`, Android's launch
  # drawable uses `android:gravity="fill"`). Per package docs `color` and
  # `background_image` cannot both be set at the top level, so we use
  # `background_image` here and provide a fallback `color` only inside the
  # `android_12` block (where the new API needs a solid color BG).
  background_image: assets/splash/logo.png
  background_image_dark: assets/splash/logo_dark.png

  android_12:
    # Android 12+'s new splash API ignores `background_image` and only
    # supports a centered icon on a solid color BG. Use the square brand
    # icon there to keep parity with the launcher.
    color: "#01497D"
    color_dark: "#01497D"
    image: assets/icon/icon.png
    image_dark: assets/icon/icon.png

  # Platforms to generate native assets for.
  android: true
  ios: true
  web: false

# App launcher icon configuration.
# After editing this section (or regenerating icons via
# `python3 tool/generate_logo.py`) run:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  # iOS: must be opaque PNG (no alpha) — icon.png is generated with solid BG.
  ios: true
  remove_alpha_ios: true
  # Android: legacy + adaptive icons.
  android: "launcher_icon"
  # Solid white background — matches the brand image's outer ring so the
  # rounded-square artwork blends seamlessly under circular / squircle
  # launcher masks (issue #167).
  adaptive_icon_background: "assets/icon/icon_background.png"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  min_sdk_android: 21
